name: Release nightly build (built with docker) 

on:
  push:
    branches:
      - nightly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-linux-x64:
    strategy:
      fail-fast: false
      matrix:
        package:
          - deb
          - fedora
          - almalinux
          - rockylinux
          - unix

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - run: pnpm package:${{ matrix.package }}

      - uses: actions/upload-artifact@v4
        with:
          name: package-linux-x64-${{ matrix.package }}
          path: dist/

  installer-linux-x64:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm ci

      - run: pnpm installer:build

      - uses: actions/upload-artifact@v4
        with:
          name: installer-linux-x64
          path: dist/

  release:
    needs:
      - package-linux-x64
      - installer-linux-x64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling-nightly
          name: Rolling Release (nightly)
          prerelease: true
          files: |
            **/*.tar.*
            **/*.deb
            **/*.rpm
            **/minopanel-installer.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
